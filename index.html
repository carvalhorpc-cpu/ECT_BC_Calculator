<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>ECT / BCT Interno CST</title>
<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
.container { max-width:1100px; margin:auto; padding:20px; }
.logo { display:block; margin:0 auto 20px; max-width:180px;}
.section {
  background:white;
  padding:15px;
  margin-bottom:20px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}
h2 { text-align:center; }
input, select { width:100px; margin:5px; }
.layer { margin-bottom:8px; }
.result { font-weight:bold; font-size:16px; margin-top:8px; }
.green { color:green; }
.red { color:red; }
button { margin:5px; padding:5px 10px; }
</style>
</head>
<body>

<div class="container">

<img src="https://www.cst.pt/assets/img/logo/CST%20logo.png" class="logo">

<h2>Ferramenta Interna CST – ECT / BCT + FEFCO</h2>

<div class="section">
<h3>Dimensões da Caixa (mm)</h3>
L: <input type="number" id="L" value="400">
W: <input type="number" id="W" value="300">
H: <input type="number" id="H" value="200">
Espessura cartão (mm):
<input type="number" id="thickness" value="6">
</div>

<div class="section">
<h3>Modelo FEFCO</h3>
<select id="fefco" onchange="calculate()">
  <option value="0200">0200</option>
  <option value="0201" selected>0201</option>
  <option value="0203">0203</option>
</select>
</div>

<div class="section">
<h3>Estrutura do Cartão</h3>
<div id="layers"></div>
<button onclick="addLayer()">Adicionar Layer</button>
<button onclick="removeLayer()">Remover Layer</button>
</div>

<div class="section">
<h3>Máquina / Folha Master</h3>
Folha master comprimento (mm):
<input type="number" id="masterL" value="2500">
Folha master largura (mm):
<input type="number" id="masterW" value="1400">

<div class="result" id="plateSize"></div>
<div class="result" id="machineCheck"></div>
<div class="result" id="sheetUse"></div>
</div>

<div class="section">
<h3>Resultados Estruturais</h3>
<div class="result" id="ECT"></div>
<div class="result" id="BCT"></div>
<div class="result" id="SafeLoad"></div>
</div>

</div>

<script>

// CONSTANTES INTERNAS
const k = 5.87;
const humidityFactor = 1;
const safetyFactor = 3;
const glue = 30;
const maxLength = 3100;
const maxWidth = 1600;

let layers = [
 {type:"Liner", sct:30, wave:""},
 {type:"Fluting", sct:22, wave:"C"},
 {type:"Liner", sct:30, wave:""}
];

function waveFactor(w){
 if(w=="B") return 1.36;
 if(w=="C") return 1.44;
 return 1;
}

function render(){
 const div=document.getElementById("layers");
 div.innerHTML="";
 layers.forEach((l,i)=>{
  div.innerHTML+=`
  <div class="layer">
  Layer ${i+1}
  <select onchange="layers[${i}].type=this.value;calculate()">
   <option value="Liner" ${l.type=="Liner"?"selected":""}>Liner</option>
   <option value="Fluting" ${l.type=="Fluting"?"selected":""}>Fluting</option>
  </select>
  SCT:
  <input type="number" value="${l.sct}" step="0.1"
   onchange="layers[${i}].sct=parseFloat(this.value)||0;calculate()">
  Onda:
  <select onchange="layers[${i}].wave=this.value;calculate()">
   <option value="">--</option>
   <option value="B" ${l.wave=="B"?"selected":""}>B</option>
   <option value="C" ${l.wave=="C"?"selected":""}>C</option>
  </select>
  </div>`;
 });
 calculate();
}

function addLayer(){
 if(layers.length<5){
  layers.push({type:"Liner", sct:0, wave:""});
  render();
 }
}

function removeLayer(){
 if(layers.length>3){
  layers.pop();
  render();
 }
}

function calculate(){

 let totalSCT=0;
 layers.forEach(l=>{
  let s=parseFloat(l.sct)||0;
  if(l.type=="Fluting"){
   s*=waveFactor(l.wave);
  }
  totalSCT+=s;
 });

 let ECT=0.75*totalSCT;
 let ECTcorr=ECT*humidityFactor;

 let L=parseFloat(document.getElementById("L").value)||0;
 let W=parseFloat(document.getElementById("W").value)||0;
 let H=parseFloat(document.getElementById("H").value)||0;
 let t=parseFloat(document.getElementById("thickness").value)||0;

 let perimeter=2*((L/1000)+(W/1000));

 let model=document.getElementById("fefco").value;

 let modelFactor=1;
 if(model=="0200") modelFactor=0.95;
 if(model=="0201") modelFactor=1.00;
 if(model=="0203") modelFactor=1.15;

 let BCT=k*ECTcorr*Math.sqrt(perimeter*(t/1000));
 BCT=BCT*modelFactor;

 let safeLoad=BCT/safetyFactor;

 document.getElementById("ECT").innerHTML="ECT calculado: "+ECT.toFixed(2)+" kN/m";
 document.getElementById("BCT").innerHTML="BCT estimado: "+BCT.toFixed(2)+" kg";
 document.getElementById("SafeLoad").innerHTML="Carga segura recomendada: "+safeLoad.toFixed(2)+" kg";

 // Cálculo placa
 let plateLength=2*L+2*W+glue+2*t;
 let plateWidth=0;

 if(model=="0200") plateWidth=H;
 if(model=="0201") plateWidth=H+W+t;
 if(model=="0203") plateWidth=H+2*W+t;

 document.getElementById("plateSize").innerHTML=
 "Placa necessária ("+model+"): "+plateLength.toFixed(0)+" x "+plateWidth.toFixed(0)+" mm";

 if(plateLength>maxLength || plateWidth>maxWidth){
  document.getElementById("machineCheck").innerHTML=
  "<span class='red'>FORA da capacidade da máquina (3100x1600)</span>";
 } else {
  document.getElementById("machineCheck").innerHTML=
  "<span class='green'>Dentro da capacidade da máquina</span>";
 }

 let masterL=parseFloat(document.getElementById("masterL").value)||0;
 let masterW=parseFloat(document.getElementById("masterW").value)||0;

 let fitL=Math.floor(masterL/plateLength);
 let fitW=Math.floor(masterW/plateWidth);
 let totalPerSheet=fitL*fitW;

 document.getElementById("sheetUse").innerHTML=
 "Caixas por folha master: "+totalPerSheet;
}

render();

</script>

</body>
</html>
