<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>CST Industrial Packaging Tool</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body { font-family: Arial; background:#f4f6f8; margin:0; }
.container { max-width:1200px; margin:auto; padding:20px; }
.section { background:white; padding:15px; margin-bottom:20px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
h2 { text-align:center; }
input, select { width:100px; margin:5px; }
.result { font-weight:bold; margin-top:5px; }
button { padding:6px 12px; margin-top:10px; }
canvas { max-width:500px; margin:auto; display:block; }
.logo { display:block; margin:0 auto 15px; max-width:180px;}
</style>
</head>
<body>

<div class="container">

<img src="https://www.cst.pt/assets/img/logo/CST%20logo.png" class="logo">

<h2>CST Industrial Packaging Tool</h2>

<div class="section">
<h3>Dimensões Caixa (mm)</h3>
L <input id="L" type="number" value="400">
W <input id="W" type="number" value="300">
H <input id="H" type="number" value="200">
Espessura <input id="t" type="number" value="6">
</div>

<div class="section">
<h3>Material</h3>
ECT (kN/m) <input id="ECTinput" type="number" value="7">
Gramagem (g/m²) <input id="gsm" type="number" value="550">
Custo cartão €/ton <input id="costTon" type="number" value="900">
</div>

<div class="section">
<h3>Folha Master</h3>
Comp <input id="masterL" type="number" value="2500">
Larg <input id="masterW" type="number" value="1400">
</div>

<div class="section">
<h3>Palete</h3>
Altura palete (mm) <input id="palletH" type="number" value="1500">
Altura base (mm) <input id="baseH" type="number" value="150">
</div>

<div class="section">
<button onclick="calculate()">Calcular</button>
<button onclick="exportPDF()">Exportar PDF</button>

<div id="results"></div>
<canvas id="chart"></canvas>
</div>

</div>

<script>

const k=5.87;
const safety=3;

let chart;

function calculate(){

let L=+document.getElementById("L").value;
let W=+document.getElementById("W").value;
let H=+document.getElementById("H").value;
let t=+document.getElementById("t").value;
let ECT=+document.getElementById("ECTinput").value;
let gsm=+document.getElementById("gsm").value;
let costTon=+document.getElementById("costTon").value;
let masterL=+document.getElementById("masterL").value;
let masterW=+document.getElementById("masterW").value;
let palletH=+document.getElementById("palletH").value;
let baseH=+document.getElementById("baseH").value;

let perimeter=2*((L/1000)+(W/1000));
let BCT=k*ECT*Math.sqrt(perimeter*(t/1000));
let safe=BCT/safety;

let plateL=2*L+2*W+30+2*t;
let plateW=H+W+t;

let fitL=Math.floor(masterL/plateL);
let fitW=Math.floor(masterW/plateW);
let perSheet=fitL*fitW;

let plateArea=(plateL/1000)*(plateW/1000);
let weight=(plateArea*gsm)/1000;
let costPerKg=costTon/1000;
let costBox=weight*costPerKg;

let layers=Math.floor((palletH-baseH)/H);
let boxesPerPallet=layers* (Math.floor(1200/L)*Math.floor(800/W));

document.getElementById("results").innerHTML=
"Placa: "+plateL.toFixed(0)+"x"+plateW.toFixed(0)+" mm<br>"+
"BCT: "+BCT.toFixed(1)+" kg<br>"+
"Carga segura: "+safe.toFixed(1)+" kg<br>"+
"Caixas/folha: "+perSheet+"<br>"+
"Peso caixa: "+weight.toFixed(2)+" kg<br>"+
"Custo estimado/caixa: €"+costBox.toFixed(2)+"<br>"+
"Caixas por palete: "+boxesPerPallet;

if(chart) chart.destroy();

chart=new Chart(document.getElementById('chart'),{
type:'bar',
data:{
labels:['BCT','Carga Segura'],
datasets:[{
label:'kg',
data:[BCT,safe]
}]
}
});

}

async function exportPDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
doc.text("CST Industrial Packaging Report",20,20);
doc.text(document.getElementById("results").innerText,20,40);
doc.save("CST_Report.pdf");
}

</script>

</body>
</html>
