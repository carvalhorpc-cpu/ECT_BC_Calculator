<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>ECT / BCT Calculator - CST</title>
<style>
body { font-family: Arial; padding:20px; max-width:900px; margin:auto;}
.logo { display:block; margin:0 auto 20px; max-width:200px;}
.layer { margin-bottom:10px;}
.result { font-weight:bold; margin-top:10px;}
</style>
</head>
<body>

<img src="https://www.cst.pt/assets/img/logo/CST%20logo.png" class="logo">

<h2>Calculadora Técnica ECT / BCT</h2>

<h3>Dimensões da Caixa (mm)</h3>
L: <input type="number" id="L" value="400">
W: <input type="number" id="W" value="300">
H: <input type="number" id="H" value="200">

<h3>Layers</h3>
<div id="layers"></div>
<button onclick="addLayer()">Adicionar Layer</button>
<button onclick="removeLayer()">Remover Layer</button>

<div class="result" id="ECT"></div>
<div class="result" id="BCT"></div>

<script>
let layers = [
 {type:"Kraft", grammage:130, wave:""},
 {type:"Fluting", grammage:120, wave:"C"},
 {type:"Kraft", grammage:130, wave:""}
];

function factorWave(wave){
 if(wave=="B") return 1.36;
 if(wave=="C") return 1.44;
 return 1;
}

function sctBase(type,g){
 if(type=="Kraft") return g*0.22;
 if(type=="Testliner") return g*0.20;
 if(type=="Fluting") return g*0.18;
 if(type=="Semi-Quimico") return g*0.21;
 return 0;
}

function render(){
 const div=document.getElementById("layers");
 div.innerHTML="";
 layers.forEach((l,i)=>{
   div.innerHTML+=`
   <div class="layer">
   Layer ${i+1}:
   <select onchange="layers[${i}].type=this.value;calculate()">
   <option ${l.type=="Kraft"?"selected":""}>Kraft</option>
   <option ${l.type=="Testliner"?"selected":""}>Testliner</option>
   <option ${l.type=="Fluting"?"selected":""}>Fluting</option>
   <option ${l.type=="Semi-Quimico"?"selected":""}>Semi-Quimico</option>
   </select>
   g/m² <input type="number" value="${l.grammage}" onchange="layers[${i}].grammage=this.value;calculate()">
   Onda:
   <select onchange="layers[${i}].wave=this.value;calculate()">
   <option value="">--</option>
   <option value="B" ${l.wave=="B"?"selected":""}>B</option>
   <option value="C" ${l.wave=="C"?"selected":""}>C</option>
   </select>
   </div>`;
 });
 calculate();
}

function addLayer(){
 if(layers.length<5){
   layers.push({type:"Kraft",grammage:120,wave:""});
   render();
 }
}

function removeLayer(){
 if(layers.length>3){
   layers.pop();
   render();
 }
}

function calculate(){
 let total=0;

 layers.forEach(l=>{
   let sct=sctBase(l.type,parseFloat(l.grammage)||0);
   if(l.type=="Fluting" || l.type=="Semi-Quimico"){
     sct*=factorWave(l.wave);
   }
   total+=sct;
 });

 let ECT=0.75*total;

 let L=parseFloat(document.getElementById("L").value)||0;
 let W=parseFloat(document.getElementById("W").value)||0;
 let thickness=layers.reduce((s,l)=>s+(l.grammage||0),0)/1000;

 let BCT=5.87*ECT*Math.sqrt(2*((L/1000)+(W/1000))*thickness);

 document.getElementById("ECT").innerHTML="ECT estimado: "+ECT.toFixed(2)+" kN/m";
 document.getElementById("BCT").innerHTML="BCT estimado: "+BCT.toFixed(2)+" kg";
}

render();
</script>

</body>
</html>
