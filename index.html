<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Cartão BC - Calculadora ECT/BCT</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; max-width: 900px; margin: auto; }
h1 { text-align:center; }
input, select { width: 80px; margin-left:5px; }
.layer { margin-bottom: 10px; }
.result { margin-top: 15px; font-weight: bold; }
</style>
</head>
<body>

<h1>Cartão BC - Calculadora ECT e BCT</h1>

<h3>Dimensões da caixa (mm)</h3>
L: <input type="number" id="boxL" value="400"> 
W: <input type="number" id="boxW" value="300"> 
H: <input type="number" id="boxH" value="200">

<h3>Layers (3 a 5)</h3>
<div id="layers"></div>
<button onclick="addLayer()">Adicionar Layer</button>
<button onclick="removeLayer()">Remover Layer</button>

<div class="result" id="totalSCT"></div>
<div class="result" id="ECT"></div>
<div class="result" id="BCT"></div>

<script>
let layersData = [
  {type:'Kraft', grammage:130},
  {type:'Fluting', grammage:120},
  {type:'Kraft', grammage:130}
];

function renderLayers(){
  const container = document.getElementById('layers');
  container.innerHTML = '';
  layersData.forEach((layer,i)=>{
    const div = document.createElement('div');
    div.className = 'layer';
    div.innerHTML = `Layer ${i+1}: 
      <select onchange="updateLayerType(${i}, this.value)">
        <option value="">--</option>
        <option value="Kraft" ${layer.type==='Kraft'?'selected':''}>Kraft</option>
        <option value="Testliner" ${layer.type==='Testliner'?'selected':''}>Testliner</option>
        <option value="Fluting" ${layer.type==='Fluting'?'selected':''}>Fluting</option>
        <option value="Fluting Semi-Quimico" ${layer.type==='Fluting Semi-Quimico'?'selected':''}>Fluting Semi-Quimico</option>
      </select>
      Gramagem: <input type='number' value='${layer.grammage}' onchange='updateLayerGrammage(${i}, this.value)'> g/m²
    `;
    container.appendChild(div);
  });
  calculate();
}

function updateLayerType(index, value){
  layersData[index].type = value;
  calculate();
}

function updateLayerGrammage(index, value){
  layersData[index].grammage = parseFloat(value)||0;
  calculate();
}

function addLayer(){
  if(layersData.length<5){
    layersData.push({type:'', grammage:0});
    renderLayers();
  }
}

function removeLayer(){
  if(layersData.length>3){
    layersData.pop();
    renderLayers();
  }
}

function calcSCT(layer){
  const g = layer.grammage || 0;
  switch(layer.type){
    case 'Kraft': return g*0.22;
    case 'Testliner': return g*0.20;
    case 'Fluting': return g*0.18;
    case 'Fluting Semi-Quimico': return g*0.20;
    default: return 0;
  }
}

function calculate(){
  let totalSCT = layersData.reduce((sum,l)=>sum+calcSCT(l),0);
  let ECTFactor = 0.75;
  let ECT = totalSCT*ECTFactor;
  let thickness_mm = layersData.reduce((sum,l)=>sum+(l.grammage||0),0);
  let L = parseFloat(document.getElementById('boxL').value)||0;
  let W = parseFloat(document.getElementById('boxW').value)||0;
  let BCT = 5.87*ECT*Math.sqrt(2*((L/1000)+(W/1000))*(thickness_mm/1000));

  document.getElementById('totalSCT').innerText = 'Total SCT: '+totalSCT.toFixed(2)+' kN/m';
  document.getElementById('ECT').innerText = 'ECT: '+ECT.toFixed(2)+' kN/m';
  document.getElementById('BCT').innerText = 'Estimated BCT: '+BCT.toFixed(2)+' kg';
}

// Atualiza cálculo ao mudar dimensões
['boxL','boxW','boxH'].forEach(id=>{
  document.getElementById(id).addEventListener('input', calculate);
});

renderLayers();
</script>

</body>
</html>
